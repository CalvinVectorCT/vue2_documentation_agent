name: Release VSIX

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Compile extension
        run: npm run compile
      
      - name: Package VSIX
        run: npx vsce package --no-dependencies
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Vue 2 Docs Agent ${{ github.ref_name }}
          body: |
            ## Install This Extension

            1. In **Assets**, download the `.vsix` file (for example: `vue-docs-agent-1.0.2.vsix`).
            2. Open VS Code.
            3. Go to **Extensions** (`Ctrl+Shift+X`).
            4. Click the `...` menu and choose **Install from VSIX...**.
            5. Select the downloaded `.vsix` file.

            After installation, open Copilot Chat and use `@vue-docs` commands.

            ## Important

            Do not download source code zip/tarball for installation. You must install the `.vsix` asset.
          files: |
            vue-docs-agent-*.vsix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
